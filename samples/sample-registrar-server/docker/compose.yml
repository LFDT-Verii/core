name: sample-registrar-server
include:
  - ../../../eng/docker/services/shared-compose.yml
  - ../../../eng/docker/services/auth-compose.yml
  - ../../../eng/docker/services/fineract-compose.yml

services:
  registrar-migrations:
    depends_on:
      velocity-mongo:
        condition: service_started
    image: velocitycore/sample-registrar-server-migrations:local
    build:
      context: ../../..
      dockerfile: eng/docker/Dockerfile-NodeE2E
      target: builder
      args:
        SERVICE: registrar-migrations
        NODE_ENV: development
        SRC_DIR: samples/sample-registrar-server
    restart: on-failure
    volumes:
      - ../../../packages:/app/packages
      - /app/samples/sample-registrar-server/node_modules
      - ..:/app/samples/sample-registrar-server
      - ../../sample-lib-app:/app/samples/sample-lib-app
    command: "pnpm --dir samples/sample-registrar-server run migrate:up"
    env_file:
      - ../.localdev.env

  registrar:
    depends_on:
      certfix:
        condition: service_started
      contracts-deployment:
        condition: service_completed_successfully
      registrar-migrations:
        condition: service_completed_successfully
      velocity-mongo:
        condition: service_started
      fineract-probe:
        condition: service_healthy
      auth0:
        condition: service_started
    image: velocitycore/sample-registrar-server:local
    build:
      context: ../../..
      dockerfile: eng/docker/Dockerfile-NodeE2E
      target: builder
      args:
        SERVICE: registrar
        SRC_DIR: samples/sample-registrar-server
    restart: on-failure
    volumes:
      - ../../../packages:/app/packages
      - /app/samples/sample-registrar-server/node_modules
      - ..:/app/samples/sample-registrar-server
      - httpscert:/certs
    command: pnpm --dir samples/sample-registrar-server exec nodemon --exec "pnpm start"
    env_file:
      - ../.localdev.env
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    ports:
      - 13999:3000

  registrar-proxy:
    image: nginx:alpine@sha256:1a8724a52d432501548a8d8681bb1554c2d09778f8b9ed0882fc3442549980b7
    restart: on-failure
    depends_on:
      registrar:
        condition: service_healthy
      certfix:
        condition: service_started
    ports:
      - "13003:80"
      - "13004:443"
    volumes:
      - httpscert:/etc/nginx/ssl
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
