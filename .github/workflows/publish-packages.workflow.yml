name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Publish target
        default: prerelease
        options:
          - prerelease
          - production
      groups:
        type: string
        description: Comma-separated release groups to publish
        default: platform,credentialagent,credentialinghub,sdk-nodejs
      prerelease_bump:
        type: choice
        description: Version bump for prerelease publishing
        default: preminor
        options:
          - preminor
          - prepatch
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "servers/**"
      - "tools/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prerelease' }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24.x"
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  prerelease-publish:
    name: Publish prerelease packages
    if: github.event_name == 'push' || inputs.environment == 'prerelease'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      RELEASE_GROUPS: ${{ github.event_name == 'workflow_dispatch' && inputs.groups || 'platform,credentialagent,credentialinghub,sdk-nodejs' }}
      PRERELEASE_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease_bump || 'preminor' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Enable Corepack
        run: corepack enable
      - name: Configure package registry auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate prerelease branch
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Prerelease publishes are only allowed from main."
            exit 1
          fi

          case "${PRERELEASE_BUMP}" in
            preminor|prepatch) ;;
            *)
              echo "Unsupported prerelease bump: ${PRERELEASE_BUMP}"
              exit 1
              ;;
          esac
      - name: Derive prerelease id
        id: prerelease-version
        shell: bash
        run: echo "preid=pre.$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: Version prerelease packages
        run: >-
          pnpm exec nx release version "${PRERELEASE_BUMP}"
          --groups "${RELEASE_GROUPS}"
          --preid "${{ steps.prerelease-version.outputs.preid }}"
          --git-commit=false
          --git-tag=false
      - name: Publish prerelease packages
        run: >-
          pnpm exec nx release publish
          --groups "${RELEASE_GROUPS}"
          --tag prerelease
          --registry https://registry.npmjs.org
          --parallel=1

  promote-release:
    name: Publish production packages
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Enable Corepack
        run: corepack enable
      - name: Configure package registry auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate production release context
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_GROUPS: ${{ inputs.groups }}
        shell: bash
        run: |
          node - "${RELEASE_GROUPS}" <<'NODE' > /tmp/release-groups.tsv
          const fs = require('node:fs');
          const path = require('node:path');

          const rootsForGroup = {
            platform: ['packages/auth'],
            credentialagent: ['servers/credentialagent'],
            credentialinghub: ['servers/credentialinghub'],
            'sdk-nodejs': ['packages/vnf-wallet-sdk-nodejs'],
          };

          const selectedGroups = process.argv[2].split(',').map((group) => group.trim()).filter(Boolean);

          for (const group of selectedGroups) {
            const roots = rootsForGroup[group];
            if (!roots) {
              throw new Error(`Unknown release group: ${group}`);
            }
            const manifest = JSON.parse(fs.readFileSync(path.join(roots[0], 'package.json'), 'utf8'));
            if (!/^\d+\.\d+\.\d+(?:-.+)?$/.test(manifest.version)) {
              throw new Error(`Release group ${group} has invalid package version: ${manifest.version}`);
            }
            const tag = `${group}-v${manifest.version}`;
            const releaseNotesFile = path.join(process.env.GITHUB_WORKSPACE, '.github/releases', `${tag}.md`);
            process.stdout.write(`${group}\t${manifest.version}\t${tag}\t${releaseNotesFile}\n`);
          }
          NODE

          while IFS=$'\t' read -r group version tag release_notes_file; do
            echo "Validating release notes for ${group} ${version} (${tag})."
            bash ./.github/scripts/validate-release-notes.sh "${release_notes_file}"

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists."
              exit 1
            fi

            if gh release view "${tag}" >/dev/null 2>&1; then
              echo "GitHub Release ${tag} already exists."
              exit 1
            fi
          done < /tmp/release-groups.tsv
      - name: Publish production packages
        env:
          RELEASE_GROUPS: ${{ inputs.groups }}
        run: >-
          pnpm exec nx release publish
          --groups "${RELEASE_GROUPS}"
          --tag latest
          --registry https://registry.npmjs.org
          --parallel=1
      - name: Create production tags and GitHub releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          while IFS=$'\t' read -r group version tag release_notes_file; do
            echo "Creating release artifacts for ${group} ${version} (${tag})."
            git tag "${tag}" "${GITHUB_SHA}"
            git push origin "refs/tags/${tag}"
            gh release create "${tag}" --repo "${GITHUB_REPOSITORY}" --target "${GITHUB_SHA}" --title "${tag}" --notes-file "${release_notes_file}"
          done < /tmp/release-groups.tsv
