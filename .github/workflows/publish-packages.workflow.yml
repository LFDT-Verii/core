name: Publish Packages
on:
  push:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'packages/**'
      - 'servers/**'
      - 'tools/**'
  workflow_dispatch:
    inputs:
      version-type:
        type: choice
        description: Choose environment
        default: 'prerelease'
        options: 
        - prerelease
        - release
env:
  LERNA_VERSION: '9.0.3'
  DIST_TAG: 'prerelease'
  NODE_VERSION: '24.x'
  VERSION_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.version-type || format('{0}', 'prerelease') }}
jobs:
  # Publish Packages
  publish-packages:
    name: Publish Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Recommended for Lerna to track history
      - name: Load Release Metadata
        shell: bash
        run: |
          repo_version="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s\n' "${repo_version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must contain a semantic version like X.Y.Z."
            exit 1
          fi

          major_minor="$(printf '%s' "${repo_version}" | cut -d. -f1,2)"
          release_branch="release/${major_minor}.x"
          release_version="v${repo_version}"
          release_notes_file="${GITHUB_WORKSPACE}/.github/releases/${release_version}.md"

          echo "REPO_VERSION=${repo_version}" >> "$GITHUB_ENV"
          echo "RELEASE_BRANCH=${release_branch}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_FILE=${release_notes_file}" >> "$GITHUB_ENV"
      - name: Validate Release Context
        shell: bash
        run: |
          if [ "${VERSION_TYPE}" = "release" ] && [ "${GITHUB_REF_NAME}" != "${RELEASE_BRANCH}" ]; then
            echo "Prod releases for ${REPO_VERSION} must run from ${RELEASE_BRANCH}, not ${GITHUB_REF_NAME}."
            exit 1
          fi

          if [ "${VERSION_TYPE}" = "prerelease" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Prerelease publishes must run from main."
            exit 1
          fi

          if [ "${VERSION_TYPE}" = "release" ]; then
            ./.github/scripts/validate-release-notes.sh "${RELEASE_NOTES_FILE}"

            if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_VERSION}" >/dev/null 2>&1; then
              echo "Tag ${RELEASE_VERSION} already exists."
              exit 1
            fi
          fi
      # Generate PreRelease Version Number
      - name: Generate PreRelease Version Number
        run: echo "PRERELEASE_VER_NUM=${REPO_VERSION}-pre.$(date +%s)" >> $GITHUB_ENV
      # Set Npm Version Number
      - name: Set Npm Version Number
        shell: bash
        run: |
          if [ "${VERSION_TYPE}" = "release" ]; then
            echo "NPM_VER_NUM=${REPO_VERSION}" >> "$GITHUB_ENV"
          else
            echo "NPM_VER_NUM=${PRERELEASE_VER_NUM}" >> "$GITHUB_ENV"
          fi
      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      # Get yarn cache directory path
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
      # Restore yarn cached
      - name: Restore yarn cached
        id: cache-yarn-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ${{ steps.yarn-cache-dir-path.outputs.dir }}
            node_modules
          key: ${{ runner.os }}-${{ env.NODE_VERSION }}-yarn-${{ hashFiles('yarn.lock') }}
      # Install Dependencies
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      # Install Lerna
      - name: Install Lerna
        run: yarn global add lerna@${{ env.LERNA_VERSION }}
      # Resolve Lerna binary once and reuse it across steps
      - name: Resolve Lerna Binary
        run: echo "LERNA_BIN=$(yarn global bin)/lerna" >> $GITHUB_ENV
      # Set Version
      - name: Set Version
        run: '"$LERNA_BIN" version --no-git-tag-version --no-push --exact --yes ${{ env.NPM_VER_NUM }}'
      # Git Set Identity
      - name: Git Identity
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      # Set Dist Tag For Release
      - name: Set Dist Tag For Release
        run: echo 'DIST_TAG=latest' >> $GITHUB_ENV
        if: env.VERSION_TYPE == 'release'
      # Commit Version Locally for Npmjs
      - name: Commit Version Locally for Npmjs
        run: git commit -am "Creating Version ${{ env.NPM_VER_NUM }}"
      # Publish to NpmJS with trusted publishing (OIDC + provenance)
      # Lerna v9+ has native support for npm trusted publishing
      # See: https://lerna.js.org/docs/features/version-and-publish
      - name: Publish NpmJS
        run: '"$LERNA_BIN" publish --dist-tag ${{ env.DIST_TAG }} from-package --yes --registry "https://registry.npmjs.org/"'
        env:
          NPM_CONFIG_PROVENANCE: true
      - name: Create GitHub Release
        if: env.VERSION_TYPE == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${RELEASE_VERSION}" \
            --notes-file "${RELEASE_NOTES_FILE}"
