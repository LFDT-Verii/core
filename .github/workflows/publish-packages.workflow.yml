name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Publish target
        default: prerelease
        options:
          - prerelease
          - production
      groups:
        type: string
        description: Comma-separated release groups to publish
        default: platform,credentialagent,sdk-nodejs
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'servers/**'
      - 'tools/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prerelease' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24.x'
  NPM_CONFIG_PROVENANCE: 'true'

jobs:
  prerelease-publish:
    name: Publish prerelease packages
    if: github.event_name == 'push' || inputs.environment == 'prerelease'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      RELEASE_GROUPS: ${{ github.event_name == 'workflow_dispatch' && inputs.groups || 'platform,credentialagent,sdk-nodejs' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Enable Corepack
        run: corepack enable
      - name: Configure package registry auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Derive prerelease id
        id: prerelease-version
        shell: bash
        run: echo "preid=pre.$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: Version prerelease packages
        run: >-
          pnpm exec nx release version prerelease
          --groups "${RELEASE_GROUPS}"
          --preid "${{ steps.prerelease-version.outputs.preid }}"
          --git-commit=false
          --git-tag=false
      - name: Publish prerelease packages
        run: >-
          pnpm exec nx release publish
          --groups "${RELEASE_GROUPS}"
          --tag prerelease
          --registry https://registry.npmjs.org
          --parallel=1

  promote-release:
    name: Publish production packages
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Enable Corepack
        run: corepack enable
      - name: Configure package registry auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate production release context
        shell: bash
        run: |
          node - "${{ inputs.groups }}" <<'NODE' > /tmp/release-groups.tsv
          const fs = require('node:fs');
          const path = require('node:path');

          const rootsForGroup = {
            platform: ['packages/auth'],
            credentialagent: ['servers/credentialagent'],
            'sdk-nodejs': ['packages/vnf-wallet-sdk-nodejs'],
          };

          const selectedGroups = process.argv[2].split(',').map((group) => group.trim()).filter(Boolean);

          for (const group of selectedGroups) {
            const roots = rootsForGroup[group];
            if (!roots) {
              throw new Error(`Unknown release group: ${group}`);
            }
            const manifest = JSON.parse(fs.readFileSync(path.join(roots[0], 'package.json'), 'utf8'));
            if (!/^\d+\.\d+\.\d+(?:-.+)?$/.test(manifest.version)) {
              throw new Error(`Release group ${group} has invalid package version: ${manifest.version}`);
            }
            const [major, minor] = manifest.version.split('.');
            const releaseBranch = `release/${major}.${minor}.x`;
            const tag = `${group}-v${manifest.version}`;
            const releaseNotesFile = path.join(process.env.GITHUB_WORKSPACE, '.github/releases', `${tag}.md`);
            process.stdout.write(`${group}\t${manifest.version}\t${releaseBranch}\t${tag}\t${releaseNotesFile}\n`);
          }
          NODE

          expected_release_branch="$(cut -f3 /tmp/release-groups.tsv | sort -u)"
          if [ "$(printf '%s\n' "${expected_release_branch}" | sed '/^$/d' | wc -l | tr -d ' ')" -ne 1 ]; then
            echo "Selected release groups target multiple release branches:"
            cut -f1,2,3 /tmp/release-groups.tsv
            echo "Run production publishing separately for groups that share a release branch."
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" != "${expected_release_branch}" ]; then
            echo "Production publishes for selected groups must run from ${expected_release_branch}, not ${GITHUB_REF_NAME}."
            exit 1
          fi

          while IFS=$'\t' read -r group version release_branch tag release_notes_file; do
            echo "Production branch ${release_branch} matches ${group} ${version}."
            echo "Validating release notes for ${group} ${version} (${tag})."
            bash ./.github/scripts/validate-release-notes.sh "${release_notes_file}"
          done < /tmp/release-groups.tsv
      - name: Publish production packages
        run: >-
          pnpm exec nx release publish
          --groups "${{ inputs.groups }}"
          --tag latest
          --registry https://registry.npmjs.org
          --parallel=1
      - name: Create production tags and GitHub releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          while IFS=$'\t' read -r group version release_branch tag release_notes_file; do
            echo "Production branch ${release_branch} matched for ${group} ${version}."
            echo "Creating release artifacts for ${group} ${version} (${tag})."
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists."
            else
              git tag "${tag}" "${GITHUB_SHA}"
              git push origin "refs/tags/${tag}"
            fi

            if gh release view "${tag}" >/dev/null 2>&1; then
              echo "GitHub Release ${tag} already exists."
            else
              gh release create "${tag}" --repo "${GITHUB_REPOSITORY}" --target "${GITHUB_SHA}" --title "${tag}" --notes-file "${release_notes_file}"
            fi
          done < /tmp/release-groups.tsv
