name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Publish target
        default: staging
        options:
          - dev
          - staging
          - production
      groups:
        type: string
        description: Comma-separated release groups to publish
        default: platform,credentialagent,sdk-nodejs
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'servers/**'
      - 'tools/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24.x'
  NPM_CONFIG_PROVENANCE: 'true'

jobs:
  dev-publish:
    name: Publish dev packages
    if: github.event_name == 'push' || inputs.environment == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      RELEASE_GROUPS: ${{ github.event_name == 'workflow_dispatch' && inputs.groups || 'platform,credentialagent,sdk-nodejs' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Enable Corepack
        run: corepack enable
      - name: Configure package registry auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Derive dev prerelease id
        id: dev-version
        shell: bash
        run: echo "preid=dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Version dev packages
        run: >-
          pnpm exec nx release version prerelease
          --groups "${RELEASE_GROUPS}"
          --preid "${{ steps.dev-version.outputs.preid }}"
          --git-commit=false
          --git-tag=false
      - name: Publish dev packages
        run: >-
          pnpm exec nx release publish
          --groups "${RELEASE_GROUPS}"
          --tag dev
          --registry https://registry.npmjs.org
          --parallel=1

  promote-release:
    name: Publish ${{ inputs.environment }} packages
    if: github.event_name == 'workflow_dispatch' && inputs.environment != 'dev'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Enable Corepack
        run: corepack enable
      - name: Configure package registry auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Publish staging packages
        if: inputs.environment == 'staging'
        shell: bash
        run: |
          preid="staging.${GITHUB_SHA::7}"
          pnpm exec nx release version prerelease \
            --groups "${{ inputs.groups }}" \
            --preid "${preid}" \
            --git-commit=false \
            --git-tag=false
          pnpm exec nx release publish \
            --groups "${{ inputs.groups }}" \
            --tag staging \
            --registry https://registry.npmjs.org \
            --parallel=1
      - name: Publish production packages
        if: inputs.environment == 'production'
        run: >-
          pnpm exec nx release publish
          --groups "${{ inputs.groups }}"
          --tag latest
          --registry https://registry.npmjs.org
          --parallel=1
      - name: Create production tags and GitHub releases
        if: inputs.environment == 'production'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          node - "${{ inputs.groups }}" <<'NODE' > /tmp/release-groups.tsv
          const fs = require('node:fs');
          const path = require('node:path');

          const rootsForGroup = {
            platform: ['packages/auth'],
            credentialagent: ['servers/credentialagent'],
            'sdk-nodejs': ['packages/vnf-wallet-sdk-nodejs'],
          };

          const selectedGroups = process.argv[2].split(',').map((group) => group.trim()).filter(Boolean);

          for (const group of selectedGroups) {
            const roots = rootsForGroup[group];
            if (!roots) {
              throw new Error(`Unknown release group: ${group}`);
            }
            const manifest = JSON.parse(fs.readFileSync(path.join(roots[0], 'package.json'), 'utf8'));
            process.stdout.write(`${group}\t${manifest.version}\n`);
          }
          NODE

          while IFS=$'\t' read -r group version; do
            tag="${group}-v${version}"
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists."
            else
              git tag "${tag}" "${GITHUB_SHA}"
              git push origin "refs/tags/${tag}"
            fi

            if gh release view "${tag}" >/dev/null 2>&1; then
              echo "GitHub Release ${tag} already exists."
            else
              gh release create "${tag}" --target "${GITHUB_SHA}" --title "${tag}" --generate-notes
            fi
          done < /tmp/release-groups.tsv
