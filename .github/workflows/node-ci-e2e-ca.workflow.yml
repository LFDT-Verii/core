name: Node.js CI - CA E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    
env:
  DOCKER_REG: 'ghcr.io'
jobs:
  # Test
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - name: Clean up Runner
      run: |
        sudo apt-get clean
        docker system prune -af
        rm -rf /usr/share/dotnet
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Enable Corepack
      run: corepack enable
    - name: Get pnpm store path
      id: pnpm-store-path
      run: echo "dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"
    - name: Restore pnpm cache
      id: cache-pnpm-restore
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ${{ steps.pnpm-store-path.outputs.dir }}
          node_modules
        key: ${{ runner.os }}-${{ matrix.node-version }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
    - name: Install Dependencies
      run: pnpm install --frozen-lockfile --prefer-offline
    - name: Start Containers
      run: docker compose -f ./servers/credentialagent/e2e/docker-compose.yml up -d
    - name: Wait for Fineract to launch
      run: while ! curl http://localhost:13008; do echo "Waiting for Fineract to launch on port 13008..."; sleep 4; done;
    - name: Deploy Blockchain Contracts
      run: RPC_NODE_URL=http://localhost:18545 node ./tools/contracts-deployment/index
    - name: Run Oracle Migrations
      working-directory: ./servers/oracle
      run: MIGRATION_ENV=localdev pnpm run migrate:up
    - name: Test
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
      with:
        timeout_minutes: 10
        max_attempts: 2
        retry_on: timeout
        command: pnpm exec nx run @verii/server-credentialagent:test:e2e
      env:
        IS_CI: true
        NODE_OPTIONS: "--max_old_space_size=4096"
        NODE_TLS_REJECT_UNAUTHORIZED: 0
