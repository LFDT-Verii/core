name: Build Wallet Certifier

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/build-wallet-certifier.workflow.yml'
      - 'apps/wallet-certifier/**'
      - 'packages/aws-clients/**'
      - 'servers/credentialinghub/**'
      - 'servers/wallet-certifier/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test and build artifacts
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:8.0@sha256:7bd28e5eea1c5766a084d5818254046f3ebe3b8f20a65e3a274640189e296667
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.x

      - name: Enable Corepack
        run: corepack enable

      - name: Configure package registry
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint Wallet Certifier
        run: |
          pnpm --filter @verii/wallet-certifier-app lint
          pnpm --filter @verii/server-wallet-certifier lint

      - name: Test Wallet Certifier
        run: |
          pnpm --filter @verii/wallet-certifier-app test
          pnpm --filter @verii/server-wallet-certifier test

      - name: Test Credentialing Hub exchange inspection
        run: >-
          pnpm --filter @verii/server-credentialing-hub exec cross-env NODE_ENV=test
          node --test --test-concurrency=1 --experimental-test-module-mocks
          test/operator/exchanges-controller.test.js

      - name: Build deployable artifacts
        run: |
          pnpm --filter @verii/wallet-certifier-app build:artifact
          pnpm --filter @verii/server-wallet-certifier build:lambda

      - name: Verify artifact contents
        run: |
          unzip -l apps/wallet-certifier/dist/wallet-certifier-app.zip | grep -E 'index.html|assets/.+\.(js|css)'
          unzip -l servers/wallet-certifier/dist/wallet-certifier-lambda.zip | grep -E 'src/lambda-(api|monitor).js'
          node -e "const api=require('./servers/wallet-certifier/dist/lambda/src/lambda-api'); const monitor=require('./servers/wallet-certifier/dist/lambda/src/lambda-monitor'); if (typeof api.handler !== 'function' || typeof monitor.handler !== 'function') process.exit(1)"

      - name: Upload application artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wallet-certifier-app
          path: apps/wallet-certifier/dist/wallet-certifier-app.zip
          if-no-files-found: error

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wallet-certifier-lambda
          path: servers/wallet-certifier/dist/wallet-certifier-lambda.zip
          if-no-files-found: error
