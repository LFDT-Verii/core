# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  workflow_dispatch:
  merge_group:
  pull_request:
    branches: 
      - main
      - release/**
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REG: 'ghcr.io'
jobs:
  # Prepare
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      lint-packages: ${{ steps.packages-list.outputs.lint-packages }}
      test-packages: ${{ steps.packages-list.outputs.test-packages }}
      node-versions: '[ "24.x" ]'
      deps-cache-key: ${{ steps.cache-keys.outputs.run-key }}
    strategy:
      matrix:
        node-version: ['24.x']
    steps:
    - name: Checkout Repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Get yarn cache directory path
      id: yarn-cache-dir-path
      run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
    - name: Build Cache Keys
      id: cache-keys
      run: |
        echo "shared-key=${{ runner.os }}-${{ matrix.node-version }}-yarn-${{ hashFiles('yarn.lock') }}" >> $GITHUB_OUTPUT
        echo "run-key=${{ runner.os }}-${{ matrix.node-version }}-yarn-${{ hashFiles('yarn.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT
    - name: Restore yarn cached
      id: cache-yarn-restore
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: |
          ${{ steps.yarn-cache-dir-path.outputs.dir }}
          node_modules
          packages/*/node_modules
          servers/*/node_modules
          tools/*/node_modules
        key: ${{ steps.cache-keys.outputs.shared-key }}
    - name: Setup Token
      run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
    - name: Install Dependencies
      run: yarn install --frozen-lockfile --prefer-offline
    - name: Save yarn Cache
      id: cache-yarn-save
      uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: |
          ${{ steps.yarn-cache-dir-path.outputs.dir }}
          node_modules
          packages/*/node_modules
          servers/*/node_modules
          tools/*/node_modules
        key: ${{ steps.cache-keys.outputs.shared-key }}
      if: ${{ steps.cache-yarn-restore.outputs.cache-hit != 'true' }}
    - name: Save run-scoped Cache
      id: cache-yarn-save-run
      uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: |
          ${{ steps.yarn-cache-dir-path.outputs.dir }}
          node_modules
          packages/*/node_modules
          servers/*/node_modules
          tools/*/node_modules
        key: ${{ steps.cache-keys.outputs.run-key }}
    - name: Split Branch Name
      env:
        BRANCH: ${{ github.event.merge_group.base_ref }}
      id: split-branch-name
      run: echo "fragment=${BRANCH##*/}" >> $GITHUB_OUTPUT
      if : github.event_name == 'merge_group'
    - name: Derive SHAs `nx affected` commands~
      uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      with:
        main-branch-name: ${{ github.base_ref || steps.split-branch-name.outputs.fragment }}
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    - name: Get Lint Affected Packages
      run: |
        echo LINT_PACKAGES_LIST=$(yarn --silent nx show projects --affected --with-target lint --json) >> $GITHUB_ENV
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    - name: Get Lint All Packages
      run: |
        echo LINT_PACKAGES_LIST=$(yarn --silent nx show projects --with-target lint --json) >> $GITHUB_ENV
      if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    - name: Get Test Affected Packages
      run: |
        echo TEST_PACKAGES_LIST=$(yarn --silent nx show projects --affected --with-target test --json) >> $GITHUB_ENV
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    - name: Get Test All Packages
      run: |
        echo TEST_PACKAGES_LIST=$(yarn --silent nx show projects --with-target test --json) >> $GITHUB_ENV
      if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    - name: Set Output
      id: packages-list
      run: |
        echo "lint-packages=$LINT_PACKAGES_LIST" >> $GITHUB_OUTPUT
        echo "test-packages=$TEST_PACKAGES_LIST" >> $GITHUB_OUTPUT

  # Lint
  lint:
    name: Lint
    needs: [prepare]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.lint-packages != '[]'
    strategy:
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.lint-packages) }}
        node-version: ${{ fromJson(needs.prepare.outputs.node-versions) }}
        mongodb-version: ['8.0']
    steps:
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Get yarn cache directory path
      id: yarn-cache-dir-path
      run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
    - name: Restore yarn cached
      id: cache-yarn-restore
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: |
          ${{ steps.yarn-cache-dir-path.outputs.dir }}
          node_modules
          packages/*/node_modules
          servers/*/node_modules
          tools/*/node_modules
        key: ${{ needs.prepare.outputs.deps-cache-key }}
    - name: Install Dependencies (fallback)
      if: steps.cache-yarn-restore.outputs.cache-hit != 'true'
      run: yarn install --frozen-lockfile --prefer-offline
    - name: Build Libs
      run: yarn build:lib
    - name: Lint
      run: yarn nx run ${{ matrix.package }}:"lint:ci"
    - name: Create Artifact Name
      run: |
        echo ARTIFACT_NAME=$(echo ${{ matrix.package }} | sed -e 's+@+-+g; s+/+-+g') >> $GITHUB_ENV
      if: '!cancelled()'
    - name: Upload Lint Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: lint${{ env.ARTIFACT_NAME }}
        path: |
          **/eslint-results.json      
          !node_modules/**/eslint-results.json
      if: '!cancelled()'

  # Post Lint
  post-lint:
    name: Post Lint
    needs: lint
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.lint-packages != '[]' && !cancelled()
    steps:
    - name: Download All Reports
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
      with:
        path: reports
        pattern: lint-*
        merge-multiple: true
    - name: Publish Lint Report
      uses: ataylorme/eslint-annotate-action@v3
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        report-json: "**/eslint-results.json"

  # Test
  test:
    name: Test
    needs: [prepare, lint]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.test-packages != '[]'
    strategy:
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.test-packages) }}
        node-version: ${{ fromJson(needs.prepare.outputs.node-versions) }}
        mongodb-version: ['8.0']
    steps:
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@315db7fe45ac2880b7758f1933e6e5d59afd5e94 # 1.12.1
      with:
        mongodb-version: ${{ matrix.mongodb-version }}
        mongodb-replica-set: insert-replica-set-name
    - name: Start Besu Blockchain Node
      run: >
        docker run
        --name blockchain
        -p 8545:8545
        -v ./eng/docker/services/blockchain-config:/opt/besu/config
        -d
        hyperledger/besu:25.4.1@sha256:00468488df234ead7c0e450ffcd5bc1ac3ed62f458a0de42ba029155ecdf5331
        --genesis-file=/opt/besu/config/genesis.json
        --node-private-key-file=/opt/besu/config/key
        --rpc-http-enabled
        --rpc-http-api=ETH,NET,WEB3
        --host-allowlist=*
        --rpc-http-cors-origins=all
        --min-gas-price=0
        --profile=enterprise
    - name: Start AWS localstack
      run: docker run --name localstack -p 4566:4566 -p 4571:4571 -e SERVICES=sns,ses,kms,s3 -d localstack/localstack:2.3.2
    - name: Wait for SES to launch
      run: while ! nc -z localhost 4566; do echo "Waiting for SES to launch on port 4566..."; sleep 2; done;
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Get yarn cache directory path
      id: yarn-cache-dir-path
      run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
    - name: Restore yarn cached
      id: cache-yarn-restore
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: |
          ${{ steps.yarn-cache-dir-path.outputs.dir }}
          node_modules
          packages/*/node_modules
          servers/*/node_modules
          tools/*/node_modules
        key: ${{ needs.prepare.outputs.deps-cache-key }}
    - name: Install Dependencies (fallback)
      if: steps.cache-yarn-restore.outputs.cache-hit != 'true'
      run: yarn install --frozen-lockfile --prefer-offline
    - name: Build Libs
      run: yarn build:lib
    - name: Run Credential Agent Migrations
      working-directory: ./servers/credentialagent
      run: MONGO_URI=mongodb://localhost:27017/test-credential-agent yarn migrate:up
    - name: Test
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
      with: 
        timeout_minutes: 10
        max_attempts: 2
        retry_on: timeout
        command: yarn nx run ${{ matrix.package }}:"test:ci"
      env:
        IS_CI: true
        NODE_OPTIONS: "--max_old_space_size=4096"
    - name: Create Artifact Name
      run: |
        echo ARTIFACT_NAME=$(echo ${{ matrix.package }} | sed -e 's+@+-+g; s+/+-+g') >> $GITHUB_ENV
      if: '!cancelled()'
    - name: Upload Test Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: test${{ env.ARTIFACT_NAME }}
        path: |
          **/test-results.junit.xml
          !node_modules/**/test-results.junit.xml
      if: '!cancelled()'
    - name: Upload Codecov Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: coverage${{ env.ARTIFACT_NAME }}
        path: |
          **/lcov.info
          !tools/**/lcov.info          
          !samples/**/lcov.info
          !node_modules/**/lcov.info

  # Post Test
  post-test:
    name: Post Test
    needs: test
    permissions:
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.test-packages != '[]' && !cancelled()
    steps:
    - name: Download All Test Reports
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
      with:
        path: test-results
        pattern: test-*
        merge-multiple: true
    - name: Publish Test Results
      uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6
      with:
        report_paths: "**/test-results.junit.xml"
        check_name: Test Results
        detailed_summary: true
        include_passed: false
        fail_on_failure: true
        fail_on_parse_error: true
        require_tests: false
        comment: true
        updateComment: true
  # Coverage Report
  coverage-report:
    name: Coverage Report
    needs: [prepare, test]
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.test-packages != '[]' && !cancelled()
    steps:
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
    - name: Download All Coverage Reports
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
      with:
        path: coverage-reports
        pattern: coverage-*
    - name: Detect Coverage Reports
      id: coverage-files
      run: |
        REPORT_COUNT=$(find coverage-reports -type f -name "lcov.info" | wc -l | tr -d ' ')
        echo "count=${REPORT_COUNT}" >> "$GITHUB_OUTPUT"
        if [ "${REPORT_COUNT}" -gt 0 ]; then
          echo "has_reports=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_reports=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Fetch PR Base Branch
      if: github.event_name == 'pull_request'
      run: git fetch --no-tags origin "${{ github.base_ref }}"
    - name: Annotate Uncovered Diff Lines
      if: github.event_name == 'pull_request' && steps.coverage-files.outputs.has_reports == 'true'
      continue-on-error: true
      uses: aki77/reviewdog-action-code-coverage@afe9f2d9588ce5ade4fa73dff380d90c3a7dd31e # v2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        lcov_path: "coverage-reports/**/lcov.info"
        reporter: github-pr-review
        filter_mode: added
        fail_level: none
    - name: PR Coverage Summary (Diff target 98%)
      if: github.event_name == 'pull_request'
      run: |
        SUMMARY_FILE=coverage-summary.md
        JOB_SUMMARY="$GITHUB_STEP_SUMMARY"
        set +e
        GITHUB_STEP_SUMMARY="$SUMMARY_FILE" python3 .github/scripts/coverage_summary.py \
          --mode pr \
          --coverage-dir coverage-reports \
          --compare-branch "origin/${{ github.base_ref }}" \
          --target 98
        STATUS=$?
        set -e
        if [ -f "$SUMMARY_FILE" ]; then
          cat "$SUMMARY_FILE" >> "$JOB_SUMMARY"
        fi
        exit $STATUS
    - name: Run Coverage Summary
      if: github.event_name != 'pull_request'
      run: |
        SUMMARY_FILE=coverage-summary.md
        JOB_SUMMARY="$GITHUB_STEP_SUMMARY"
        set +e
        GITHUB_STEP_SUMMARY="$SUMMARY_FILE" python3 .github/scripts/coverage_summary.py \
          --mode general \
          --coverage-dir coverage-reports
        STATUS=$?
        set -e
        if [ -f "$SUMMARY_FILE" ]; then
          cat "$SUMMARY_FILE" >> "$JOB_SUMMARY"
        fi
        exit $STATUS
    - name: Post Coverage Summary Comment
      if: always() && steps.coverage-files.outputs.has_reports == 'true'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      with:
        script: |
          const fs = require('node:fs');

          const marker = '<!-- coverage-summary-comment -->';
          const summaryPath = 'coverage-summary.md';
          if (!fs.existsSync(summaryPath)) {
            console.log('No coverage-summary.md file found; skipping comment.');
            return;
          }

          const summary = fs.readFileSync(summaryPath, 'utf8');
          if (!summary.trim()) {
            console.log('Coverage summary is empty; skipping comment.');
            return;
          }

          const lines = summary.split(/\r?\n/);
          const summaryTitle = lines.find((line) => line.startsWith('### ')) || '### Coverage Summary';

          const extractTableRows = (headerText) => {
            const headerIndex = lines.findIndex((line) => line.trim() === headerText);
            if (headerIndex === -1) return null;

            const tableLines = [];
            for (let i = headerIndex; i < lines.length; i += 1) {
              const current = lines[i].trim();
              if (!current.startsWith('|')) break;
              tableLines.push(current);
            }
            return tableLines.length >= 3 ? tableLines : null;
          };

          const packageTable = extractTableRows('| Package | Coverage | Covered / Total |');
          const fileTable = extractTableRows('| File | Uncovered lines | Coverage | Covered / Total |');

          const packageLines = packageTable
            ? [...packageTable.slice(0, 2), ...packageTable.slice(2, 6)]
            : ['- Coverage package table not found in summary output.'];

          const fileLines = fileTable
            ? [...fileTable.slice(0, 2), ...fileTable.slice(2, 4)]
            : ['- Coverage file table not found in summary output.'];

          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

          let prNumber = context.payload.pull_request?.number;
          if (!prNumber) {
            const headRef = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              ...context.repo,
              state: 'open',
              head: `${context.repo.owner}:${headRef}`,
              per_page: 1,
            });
            if (!pulls.length) {
              console.log(`No open PR found for branch ${headRef}; skipping comment.`);
              return;
            }
            prNumber = pulls[0].number;
          }

          const body = [
            marker,
            '## Coverage Report',
            '',
            summaryTitle,
            '',
            '### Worst 4 packages by coverage',
            ...packageLines,
            '',
            '### Worst 2 files by uncovered lines',
            ...fileLines,
            '',
            `[View full coverage report](${runUrl})`,
          ].join('\n');

          const comments = await github.paginate(github.rest.issues.listComments, {
            ...context.repo,
            issue_number: prNumber,
            per_page: 100,
          });

          const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body,
            });
          }

  # CI Result
  ci-result:
    name: CI Result
    needs: [prepare, lint, post-lint, test, post-test, coverage-report]
    runs-on: ubuntu-latest
    if: always() && !cancelled() && github.event.pull_request.draft == false
    steps:
    - name: Fail on Failure or Draft PR
      run: exit 1
      if: ${{ contains(needs.*.result, 'failure') }}
